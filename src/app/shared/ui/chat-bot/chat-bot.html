@if (!isExpanded()) {
  <button
    (click)="toggleChat()"
    class="fixed bottom-6 right-6 w-14 h-14 bg-brand-primary hover:bg-brand-dark text-white rounded-full shadow-lg flex items-center justify-center transition-all duration-300 hover:scale-110 z-50 focus:outline-hidden focus:ring-2 focus:ring-offset-2 focus:ring-brand-primary cursor-pointer animate-scale"
    aria-label="Abrir asistente de chat"
  >
    <i class="ri-message-3-line text-[24px]"></i>
  </button>
}

@if (isExpanded()) {
  <div
    class="fixed bottom-6 right-6 w-96 h-128 bg-white rounded-[8px] shadow-2xl flex flex-col z-50 border border-solid border-[#e9e9e9]"
    role="dialog"
    aria-labelledby="chat-title"
  >
    <!-- Header -->
    <div
      class="flex items-center justify-between p-4 border-b border-solid border-[#e9e9e9] bg-brand-primary text-white rounded-t-[8px]"
    >
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
          <i class="ri-customer-service-2-line text-[20px]"></i>
        </div>
        <div>
          <h3 id="chat-title" class="font-Poppins font-semibold text-[14px]">Asistente de Compras</h3>
          <p class="font-Poppins text-[12px] opacity-90">Siempre disponible</p>
        </div>
      </div>
      <button 
        (click)="toggleChat()" 
        class="hover:bg-white/20 rounded-full p-1 transition-colors cursor-pointer"
        aria-label="Cerrar chat"
      >
        <i class="ri-close-line text-[20px]"></i>
      </button>
    </div>

    <!-- Messages Area -->
    <div class="flex-1 overflow-y-auto p-4 space-y-3 bg-brand-bg-alt">
      @for (message of messages(); track message.id) {
        <div class="flex" [class.justify-end]="message.sender === 'user'">
          <div
            class="max-w-[80%] rounded-[8px] px-4 py-2.5 shadow-xs"
            [class]="
              message.sender === 'user'
                ? 'bg-brand-primary text-white'
                : 'bg-white text-brand-dark border border-solid border-[#e9e9e9]'
            "
          >
            <div class="font-Manrope text-[13px] leading-relaxed" [innerHTML]="message.content | markdown"></div>
            <span class="font-Poppins text-[10px] opacity-75 mt-1.5 block text-right">
              {{ formatTime(message.timestamp) }}
            </span>
          </div>
        </div>
      }

      <!-- Typing Indicator -->
      @if (isTyping()) {
        <div class="flex">
          <div class="bg-white border border-solid border-[#e9e9e9] rounded-[8px] px-4 py-3 shadow-xs">
            <div class="flex gap-1.5 items-center h-2">
              <div
                class="w-2.5 h-2.5 bg-brand-primary rounded-full animate-bounce"
                style="animation-delay: 0ms"
              ></div>
              <div
                class="w-2.5 h-2.5 bg-brand-muted rounded-full animate-bounce"
                style="animation-delay: 150ms"
              ></div>
              <div
                class="w-2.5 h-2.5 bg-brand-primary rounded-full animate-bounce"
                style="animation-delay: 300ms"
              ></div>
            </div>
          </div>
        </div>
      }
    </div>

    <!-- Form Area -->
    <div class="p-4 border-t border-solid border-[#e9e9e9] bg-white rounded-b-[8px]">
      <form (submit)="sendMessage()" class="flex gap-2">
        <input
          type="text"
          [(ngModel)]="currentMessage"
          name="message"
          placeholder="Escribe tu pregunta..."
          class="flex-1 px-4 py-2.5 border border-solid border-[#e9e9e9] rounded-[8px] focus:outline-hidden focus:ring-2 focus:ring-brand-primary bg-white text-brand-dark placeholder-[#777] font-Manrope text-[13px]"
          [disabled]="isTyping()"
          autocomplete="off"
        />
        <button
          type="submit"
          [disabled]="!currentMessage.trim() || isTyping()"
          class="px-4 py-2 bg-brand-primary hover:bg-brand-dark disabled:bg-[#e9e9e9] disabled:text-[#aaa] text-white rounded-[8px] transition-colors disabled:cursor-not-allowed flex items-center justify-center cursor-pointer focus:outline-hidden focus:ring-2 focus:ring-brand-primary"
          aria-label="Enviar mensaje"
        >
          <i class="ri-send-plane-fill text-[18px]"></i>
        </button>
      </form>
    </div>
  </div>
}
